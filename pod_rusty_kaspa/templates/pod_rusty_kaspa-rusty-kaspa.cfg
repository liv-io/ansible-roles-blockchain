{{ansible_managed|comment(decoration='#')}}

check process pod_rusty_kaspa-rusty-kaspa matching "/usr/local/bin/kaspad"
  start program = "/bin/systemctl start {{service_name_pod_rusty_kaspa}}"
  stop program = "/bin/systemctl stop {{service_name_pod_rusty_kaspa}}"
  if failed host 127.0.0.1 port 16110 type tcp with timeout 3 seconds for 3 cycles then alert
  if failed host 127.0.0.1 port 16111 type tcp with timeout 3 seconds for 3 cycles then alert
  if does not exist for 3 cycles then alert
